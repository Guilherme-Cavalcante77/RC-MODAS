<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Modas — Novidades</title>
<meta name="description" content="Confira as novidades da RC Modas, direto da loja pra você.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<link rel="stylesheet" href="estilo.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <span class="brand">RC <em>Modas</em></span>
    <a class="menu-btn" href="#contato" aria-label="Ir para contato">
      <span></span><span></span><span></span>
    </a>
  </header>

  <section class="intro">
    <span class="eyebrow">Novidades</span>
    <h1>Peças novas, direto<br>da loja pra você</h1>
  </section>

  <main class="catalog" id="catalog">
    <!-- os cartões de produto são gerados pelo script.js a partir de produtos.js -->
  </main>

  <footer class="footer" id="contato">
    <svg class="palm-divider" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M60 38V18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M60 20C60 20 48 14 40 18C48 22 60 20 60 20Z" stroke="currentColor" stroke-width="1.2"/>
      <path d="M60 20C60 20 72 14 80 18C72 22 60 20 60 20Z" stroke="currentColor" stroke-width="1.2"/>
      <path d="M60 16C60 16 52 8 44 8C50 14 60 16 60 16Z" stroke="currentColor" stroke-width="1.2"/>
      <path d="M60 16C60 16 68 8 76 8C70 14 60 16 60 16Z" stroke="currentColor" stroke-width="1.2"/>
      <path d="M60 14C60 14 58 4 60 2C62 4 60 14 60 14Z" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    <p class="footer-text">Feito com carinho pela RC Modas</p>
    <a class="footer-link" href="https://instagram.com/" target="_blank" rel="noopener">@rcmodas no Instagram</a>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="produtos.js"></script>
<script src="script.js"></script>
</body>
</html>
